    <script>

    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('track', 'PageView');

    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .slider-bg { background: rgba(255, 255, 255, 0.05); }
        .pfp-shadow { box-shadow: 0 0 25px rgba(59, 130, 246, 0.4); }
        #final-ui { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 overflow-hidden">

    <div class="w-full max-w-sm glass p-8 rounded-[40px] text-center relative z-10">
        
        <div class="mb-6">
            <div class="relative inline-block mb-4">
                <img src="https://i.ibb.co/pv1j3NMY/pfp.jpg" alt="Yaduveer" 
                     class="w-24 h-24 rounded-full border-2 border-blue-500 p-1 object-cover pfp-shadow">
                <div class="absolute bottom-1 right-1 w-5 h-5 bg-green-500 border-4 border-[#0d0d0d] rounded-full"></div>
            </div>
            <h1 class="text-2xl font-black tracking-tighter italic uppercase">Yaduveer <span class="text-blue-500">TRG</span></h1>
            <p class="text-zinc-500 text-[10px] tracking-[0.3em] uppercase mt-1">Institutional Signal Lab</p>
        </div>

        <div id="auth-layer">
            <p class="text-zinc-400 text-xs mb-6">Slide to verify human session</p>
            <div class="relative w-full h-14 slider-bg rounded-2xl border border-white/5 overflow-hidden" id="rail">
                <div id="handle" class="absolute left-0 top-0 h-full w-14 bg-blue-600 flex items-center justify-center cursor-pointer z-20">
                    <svg width="20" height="20" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                </div>
                <div class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-zinc-600 uppercase tracking-widest">
                    Verification Required
                </div>
            </div>
        </div>

        <div id="final-ui" class="animate-in zoom-in duration-300">
            <div class="mb-6 px-4 py-2 bg-blue-500/10 rounded-full inline-block">
                <span class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Access Granted</span>
            </div>
            <button id="cta-btn" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-xl shadow-[0_0_30px_rgba(37,99,235,0.4)] active:scale-95 transition-all">
                JOIN TELEGRAM
            </button>
        </div>

        <div class="mt-8 pt-6 border-t border-white/5">
            <p class="text-[8px] text-zinc-700 leading-tight uppercase tracking-tighter">
                Yaduveer TRG provides advanced data visualization and structural analysis for educational purposes. All signals are generated via proprietary algorithmic frequency mapping.
            </p>
        </div>
    </div>

    <script>
        const handle = document.getElementById('handle');
        const rail = document.getElementById('rail');
        const auth = document.getElementById('auth-layer');
        const finalUI = document.getElementById('final-ui');
        const cta = document.getElementById('cta-btn');

        // Target: https://t.me/+MbXv8iAPe2BlYjY1
        const securePath = "aHR0cHM6Ly90Lm1lLytNYlh2OGlBUGUyQmxZalkx";

        let isMoving = false;
        const start = () => isMoving = true;
        const end = () => isMoving = false;

        const move = (e) => {
            if (!isMoving) return;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let x = clientX - rail.getBoundingClientRect().left;
            let max = rail.offsetWidth - handle.offsetWidth;
            
            if (x < 0) x = 0;
            if (x >= max) {
                x = max;
                unlock();
            }
            handle.style.left = x + 'px';
        };

        function unlock() {
            isMoving = false;
            auth.style.display = 'none';
            finalUI.style.display = 'block';
            fbq('track', 'PageView'); // Track PageView only for humans
        }

        handle.addEventListener('mousedown', start);
        window.addEventListener('mouseup', end);
        window.addEventListener('mousemove', move);
        handle.addEventListener('touchstart', start);
        window.addEventListener('touchend', end);
        window.addEventListener('touchmove', move);

        cta.onclick = () => {
            fbq('track', 'Contact'); // Setup Contact Event as requested
            setTimeout(() => {
                window.location.href = atob(securePath);
            }, 400);
        };

        // Ultimate Anti-Bot / Force Stop Counter
        if (navigator.webdriver || !("ontouchstart" in window && window.screen.width < 1024)) {
            // If it's a desktop bot or automated driver, show a fake "Loading" screen
            if (navigator.webdriver) {
                document.body.innerHTML = "<div style='color:#222; font-family:sans-serif; text-align:center; padding-top:100px;'>Error 502: Bad Gateway</div>";
            }
        }
    </script>
</body>
